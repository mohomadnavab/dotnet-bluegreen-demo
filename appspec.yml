version: 0.0
os: linux

files:
  - source: /
    destination: /home/ubuntu/app

hooks:

  ApplicationStop:
    - location: scripts/stop.sh
      timeout: 60
      
  AfterInstall:
    - location: scripts/install.sh
      timeout: 60
  
  ApplicationStart:
    - location: scripts/start.sh
      timeout: 60

  ValidateService:
    - location: scripts/validate.sh
      timeout: 60
