version: 0.0
os: linux

files:
  - source: /
    destination: /home/ubuntu/app

hooks:

  ApplicationStop:
    - location: scripts/stop_server.sh
      timeout: 60

  BeforeInstall:
    - location: scripts/install_dependencies.sh
      timeout: 60
      
  AfterInstall:
    - location: scripts/install.sh
      timeout: 60
  
  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 60

  ValidateService:
    - location: scripts/validate.sh
      timeout: 30
